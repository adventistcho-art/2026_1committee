    <script>
let currentCategory = "전체";

function init() {
    renderSidebar();
    runFilters();
}

function renderSidebar() {
    const sidebar = document.getElementById('categoryList');
    const categories = [...new Set(committeeData.map(c => c.category))];
    document.getElementById('count-all').textContent = committeeData.length;

    categories.forEach(cat => {
        const count = committeeData.filter(c => c.category === cat).length;
        const btn = document.createElement('button');
        btn.id = `cat-${cat.replace(/\s/g, '')}`;
        btn.className = "w-full flex items-center justify-between px-4 py-2.5 rounded-xl text-sm font-medium transition-all text-slate-500 hover:bg-slate-100 hover:text-slate-800";
        btn.onclick = () => filterByCategory(cat);
        btn.innerHTML = `<span>${cat}</span><span class="text-[9px] bg-slate-100 text-slate-400 font-bold px-1.5 py-0.5 rounded-md">${count}</span>`;
        sidebar.appendChild(btn);
    });
}

function filterByCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll('#categoryList button').forEach(b => b.classList.remove('sidebar-item-active'));
    const activeBtn = cat === "전체" ? document.getElementById('cat-all') : document.getElementById(`cat-${cat.replace(/\s/g, '')}`);
    activeBtn.classList.add('sidebar-item-active');
    runFilters();
}

function runFilters() {
    const nameSearch = document.getElementById('nameInput').value.toLowerCase();
    const deptSearch = document.getElementById('deptInput').value.toLowerCase();
    
    const filtered = committeeData.filter(item => {
        const catMatch = currentCategory === "전체" || item.category === currentCategory;
        const nameMatch = item.name.toLowerCase().includes(nameSearch);
        const deptMatch = item.dept.toLowerCase().includes(deptSearch);
        return catMatch && nameMatch && deptMatch;
    });
    
    renderTable(filtered);
}

function renderTable(data) {
    const tbody = document.getElementById('dataTableBody');
    tbody.innerHTML = '';
    
    if (data.length === 0) {
        document.getElementById('emptyState').classList.remove('hidden');
        return;
    }
    document.getElementById('emptyState').classList.add('hidden');

    data.forEach(item => {
        const tr = document.createElement('tr');
        tr.className = "table-row group transition-all";
        tr.innerHTML = `
            <td class="px-6 py-5 text-center text-[10px] font-bold text-slate-300">#${item.id}</td>
            <td class="px-6 py-5">
                <div class="font-bold text-slate-800 text-sm">${item.name}</div>
                <div class="text-[10px] text-slate-400 mt-0.5 font-medium">${item.category}</div>
            </td>
            <td class="px-6 py-5 text-center">
                <button onclick="openSpecificModal(${item.id}, 'function')" class="btn-view inline-flex items-center gap-2 px-4 py-2 bg-emerald-50 text-emerald-700 text-[11px] font-bold rounded-xl border border-emerald-100 hover:bg-emerald-600 hover:text-white">
                    <i class="fas fa-tasks"></i> 기능 보기
                </button>
            </td>
            <td class="px-6 py-5 text-center">
                <button onclick="openSpecificModal(${item.id}, 'members')" class="btn-view inline-flex items-center gap-2 px-4 py-2 bg-blue-50 text-blue-700 text-[11px] font-bold rounded-xl border border-blue-100 hover:bg-blue-600 hover:text-white">
                    <i class="fas fa-users"></i> 명단 보기
                </button>
            </td>
            <td class="px-6 py-5 text-right">
                <span class="inline-block px-3 py-1 bg-slate-100 text-slate-600 text-[10px] font-bold rounded-lg border border-slate-200">
                    ${item.dept}
                </span>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

function openSpecificModal(id, mode) {
    const item = committeeData.find(d => d.id === id);
    if (!item) return;

    const modal = document.getElementById('detailModal');
    const header = document.getElementById('modalHeader');
    const badge = document.getElementById('modalBadge');
    const title = document.getElementById('modalTitle');
    const sub = document.getElementById('modalSub');
    
    const funcArea = document.getElementById('functionContent');
    const memberArea = document.getElementById('membersContent');

    title.textContent = item.name;
    sub.textContent = `${item.category} | ${item.dept}`;

    if (mode === 'function') {
        header.style.backgroundColor = '#004a26';
        badge.textContent = "주요 기능 조회";
        funcArea.classList.remove('hidden');
        memberArea.classList.add('hidden');
        document.getElementById('funcText').textContent = item.function;
    } else {
        header.style.backgroundColor = '#1e40af';
        badge.textContent = "위원 명단 조회";
        funcArea.classList.add('hidden');
        memberArea.classList.remove('hidden');
        document.getElementById('exText').textContent = item.exOfficio;
        document.getElementById('appText').textContent = item.appointed;
    }

    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('detailModal').classList.add('hidden');
    document.body.style.overflow = '';
}

window.onload = init;
    </script>
</body>
</html>
