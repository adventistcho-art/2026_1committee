<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼육대학교 제위원회 기능 조회 시스템 (2026.05.15)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        :root {
            --syu-green: #004a26;
            --syu-light-green: #e6f0eb;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            overflow: hidden;
        }

        .sidebar-item-active {
            background-color: var(--syu-green);
            color: white !important;
            box-shadow: 0 4px 12px rgba(0, 74, 38, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .table-row:hover { background-color: #f8fafc; }
        .modal-backdrop { background-color: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); }
        
        .btn-view { transition: all 0.2s; }
        .btn-view:hover { transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden">

    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shadow-xl z-20">
        <div class="p-6 border-b border-slate-100 bg-[#004a26] text-white">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-lg">
                    <i class="fas fa-university text-xl"></i>
                </div>
                <div>
                    <h1 class="text-sm font-bold tracking-tight leading-tight">삼육대학교</h1>
                    <p class="text-[10px] opacity-80 uppercase font-medium">Committee Portal</p>
                </div>
            </div>
        </div>
        
        <div class="p-4 bg-slate-50/50">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-2">상위기구 분류</span>
        </div>

        <nav id="categoryList" class="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-1">
            <button onclick="filterByCategory('전체')" id="cat-all" class="sidebar-item-active w-full flex items-center justify-between px-4 py-2.5 rounded-xl text-sm font-semibold transition-all">
                <span>전체 위원회</span>
                <span class="text-[10px] bg-white/20 px-2 py-0.5 rounded-full" id="count-all">0</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-slate-50">
        <header class="bg-white border-b border-slate-200 p-6 shadow-sm z-10">
            <div class="max-w-7xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-2xl font-black text-slate-800">제위원회 기능 조회 및 관리</h2>
                        <p class="text-sm text-slate-500 font-medium mt-1">
                            <span class="text-[#004a26] font-bold">2026.05.15 현재</span> 업데이트 완료
                        </p>
                    </div>
                    <div class="hidden md:block">
                        <div class="text-right">
                            <span class="text-[11px] font-bold text-slate-400 uppercase tracking-tighter">Academic Year</span>
                            <p class="text-sm font-bold text-slate-700">2026학년도 1학기</p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="relative group">
                        <label class="text-[10px] font-bold text-slate-400 ml-1 mb-1 block uppercase">위원회 명칭 검색</label>
                        <i class="fas fa-search absolute left-4 bottom-3 text-slate-300"></i>
                        <input type="text" id="nameInput" oninput="runFilters()" placeholder="위원회명을 입력하세요..." 
                               class="w-full pl-11 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#004a26] focus:bg-white outline-none transition-all text-sm">
                    </div>
                    <div class="relative group">
                        <label class="text-[10px] font-bold text-slate-400 ml-1 mb-1 block uppercase">관리 부서 검색</label>
                        <i class="fas fa-building absolute left-4 bottom-3 text-slate-300"></i>
                        <input type="text" id="deptInput" oninput="runFilters()" placeholder="담당 부서명을 입력하세요..." 
                               class="w-full pl-11 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#004a26] focus:bg-white outline-none transition-all text-sm">
                    </div>
                </div>
            </div>
        </header>

        <section class="flex-1 overflow-y-auto p-6 custom-scrollbar">
            <div class="max-w-7xl mx-auto">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50/80 text-[11px] font-bold text-slate-500 uppercase tracking-widest border-b border-slate-200">
                                <th class="px-6 py-4 w-16 text-center">No.</th>
                                <th class="px-6 py-4">위원회 정보</th>
                                <th class="px-6 py-4 text-center">주요 기능</th>
                                <th class="px-6 py-4 text-center">위원 명단</th>
                                <th class="px-6 py-4 text-right">관리 부서</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="text-[13px] divide-y divide-slate-100">
                        </tbody>
                    </table>
                    <div id="emptyState" class="hidden py-32 text-center">
                        <i class="fas fa-search text-4xl text-slate-200 mb-4"></i>
                        <p class="text-slate-400 font-medium">검색 결과가 없습니다.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="detailModal" class="fixed inset-0 z-[100] flex items-center justify-center hidden p-4">
        <div class="absolute inset-0 modal-backdrop" onclick="closeModal()"></div>
        <div class="relative bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden transform transition-all border border-slate-200">
            <div id="modalHeader" class="p-6 text-white relative">
                <button onclick="closeModal()" class="absolute top-5 right-5 w-8 h-8 rounded-full bg-black/10 flex items-center justify-center hover:bg-black/20 transition-all">
                    <i class="fas fa-times"></i>
                </button>
                <div class="pr-10">
                    <span id="modalBadge" class="text-[9px] font-bold uppercase tracking-widest bg-white/20 px-2 py-0.5 rounded-full mb-2 inline-block">정보 조회</span>
                    <h3 id="modalTitle" class="text-xl font-bold">위원회 명칭</h3>
                    <p id="modalSub" class="text-xs opacity-70 mt-1">상위기구 | 부서</p>
                </div>
            </div>
            
            <div class="p-8 max-h-[60vh] overflow-y-auto custom-scrollbar">
                <div id="functionContent" class="hidden">
                    <div class="flex items-center gap-2 mb-4 text-[#004a26]">
                        <i class="fas fa-thumbtack"></i>
                        <h4 class="font-bold text-sm">주요 기능 및 심의 사항</h4>
                    </div>
                    <div id="funcText" class="text-slate-600 leading-relaxed text-sm whitespace-pre-line bg-slate-50 p-5 rounded-2xl border border-slate-100"></div>
                </div>

                <div id="membersContent" class="hidden space-y-6">
                    <div>
                        <div class="flex items-center gap-2 mb-3 text-blue-600">
                            <i class="fas fa-user-shield"></i>
                            <h4 class="font-bold text-sm">당연직 구성</h4>
                        </div>
                        <div id="exText" class="text-slate-600 text-sm leading-relaxed bg-blue-50/50 p-4 rounded-xl border border-blue-100"></div>
                    </div>
                    <div>
                        <div class="flex items-center gap-2 mb-3 text-emerald-600">
                            <i class="fas fa-user-plus"></i>
                            <h4 class="font-bold text-sm">임명직 명단</h4>
                        </div>
                        <div id="appText" class="text-slate-600 text-sm leading-relaxed bg-emerald-50/50 p-4 rounded-xl border border-emerald-100"></div>
                    </div>
                </div>
            </div>
            
            <div class="px-8 py-4 bg-slate-50 border-t border-slate-100 flex justify-end">
                <button onclick="closeModal()" class="px-6 py-2 bg-slate-800 text-white rounded-xl font-bold text-xs hover:bg-black transition-all">닫기</button>
            </div>
        </div>
    </div>

    <script src="committee-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
